<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackSecurity — Registro</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='img/icono.png') }}" alt="TecTrack">
       <!-- <img src="{{ url_for('static', filename='img/badge.PNG') }}" alt="TecTrack"> -->
       <!-- <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="1" y="6" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="5" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="17" cy="18" r="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 9h20M7 6V4h8v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg> -->
      </div>
      <div class="auth-title">Crear cuenta</div>
      <div class="auth-subtitle">Regístrate para acceder al panel</div>
    </div>

    <div class="auth-error"   id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <div class="form-group">
      <label class="form-label" for="nombre">Nombre completo</label>
      <input class="form-input" type="text" id="nombre"
             placeholder="Juan García" autocomplete="name"/>
      <span class="form-error" id="errorNombre"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="correo">Correo electrónico</label>
      <input class="form-input" type="email" id="correo"
             placeholder="usuario@empresa.com" autocomplete="email"/>
      <span class="form-error" id="errorCorreo"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <div class="input-password-wrap">
        <input class="form-input" type="password" id="password"
               placeholder="Mínimo 6 caracteres (números + letras)"
               oninput="evalPassword(this.value)"/>
        <button class="btn-eye" type="button" onclick="togglePassword('password', this)"
                tabindex="-1" aria-label="Mostrar contraseña">
          <svg class="eye-icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path class="eye-open" d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"
                  stroke="currentColor" stroke-width="1.5"/>
            <circle class="eye-open" cx="10" cy="10" r="2.5"
                    stroke="currentColor" stroke-width="1.5"/>
            <path class="eye-closed" d="M3 3l14 14M1 10s3.5-6 9-6c1.8 0 3.4.5 4.8 1.3
                  M19 10s-1.5 2.6-4 4.3M7.5 17.4C8.3 17.8 9.1 18 10 18c5.5 0 9-6 9-6"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  style="display:none"/>
          </svg>
        </button>
      </div>
      <div class="password-strength">
        <div class="strength-bar" id="bar1"></div>
        <div class="strength-bar" id="bar2"></div>
        <div class="strength-bar" id="bar3"></div>
      </div>
      <span class="form-error" id="errorPassword"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="tipo">Tipo de usuario</label>
      <div class="select-wrapper">
        <select class="form-select" id="tipo">
          <option value="">-- Selecciona tu rol --</option>
          <option value="dueno">Dueño / Administrador</option>
          <option value="chofer">Chofer</option>
        </select>
      </div>
      <span class="form-error" id="errorTipo"></span>
    </div>

    <button class="btn-primary" onclick="registrar()">Crear cuenta</button>
    <div class="auth-divider"><span>¿Ya tienes cuenta?</span></div>
    <button class="btn-secondary" onclick="irLogin()">Iniciar sesión</button>

  </div>
</div>

<script src="{{ url_for('static', filename='js/registro.js') }}"></script>
<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    btn.querySelector(".eye-open")  .style.display = isHidden ? "none" : "";
    btn.querySelector(".eye-closed").style.display = isHidden ? ""     : "none";
  }

  function evalPassword(val) {
    const bars = [document.getElementById("bar1"),
                  document.getElementById("bar2"),
                  document.getElementById("bar3")];
    bars.forEach(b => b.className = "strength-bar");
    if (!val.length) return;
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    const cls = ["active-weak","active-medium","active-strong"][score-1] || "active-weak";
    for (let i = 0; i < score; i++) bars[i].classList.add(cls);
  }
</script>
</body>
</html>
