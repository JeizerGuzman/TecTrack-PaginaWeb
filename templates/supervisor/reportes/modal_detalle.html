<div
    id="modalDetalleReporte"
    class="reportes-modal"
    aria-hidden="true"
>

    <div class="reportes-modal-dialog">

        <div class="reportes-modal-header">

            <div>

                <p class="section-kicker">
                    Detalle del registro
                </p>

                <h3 id="modalDetalleReporteTitulo">
                    Detalle
                </h3>

            </div>


            <button
                type="button"
                id="btnCerrarModalDetalleReporte"
                class="reportes-modal-close"
                aria-label="Cerrar"
            >
                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>

        </div>


        <div
            id="modalDetalleReporteContenido"
            class="reportes-modal-body"
        >
        </div>


        <div class="reportes-modal-footer">

            <button
                type="button"
                id="btnCancelarModalDetalleReporte"
                class="btn btn-outline"
            >
                Cerrar
            </button>

        </div>

    </div>

</div>
