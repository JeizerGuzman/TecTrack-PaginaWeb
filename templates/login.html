<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackSecurity — Acceso</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.ico') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-logo">
        <img src="{{ url_for('static', filename='img/icono.png') }}" alt="TecTrack">
      </div>
      <div class="auth-title">TrackSecurity</div>
      <div class="auth-subtitle">Monitoreo de flota vehicular</div>
    </div>

    <div class="auth-error" id="authError"></div>

    <div class="form-group">
      <label class="form-label" for="correo">Correo electrónico</label>
      <input class="form-input" type="email" id="correo"
             placeholder="usuario@empresa.com" autocomplete="email"/>
      <span class="form-error" id="errorCorreo"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <!-- ── CAMBIO: input dentro de wrapper con botón ojo ── -->
      <div class="input-password-wrap">
        <input class="form-input" type="password" id="password"
               placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()"/>
          <button class="btn-eye" type="button" onclick="togglePassword('password', this)"
                tabindex="-1" aria-label="Mostrar contraseña">
          <svg class="eye-icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
            <path class="eye-open" d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"
                  stroke="currentColor" stroke-width="1.5"/>
            <circle class="eye-open" cx="10" cy="10" r="2.5"
                    stroke="currentColor" stroke-width="1.5"/>
            <path class="eye-closed" d="M3 3l14 14M1 10s3.5-6 9-6c1.8 0 3.4.5 4.8 1.3
                  M19 10s-1.5 2.6-4 4.3M7.5 17.4C8.3 17.8 9.1 18 10 18c5.5 0 9-6 9-6"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                  style="display:none"/>
          </svg>
        </button>
      </div>
      <span class="form-error" id="errorPassword"></span>
    </div>

    <button class="btn-primary" onclick="login()">Iniciar sesión</button>
    <div class="auth-divider"><span>¿No tienes cuenta?</span></div>
    <button class="btn-secondary" onclick="irRegistro()">Crear cuenta nueva</button>

  </div>
</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    btn.querySelector(".eye-open")  .style.display = isHidden ? "none"   : "";
    btn.querySelector(".eye-closed").style.display = isHidden ? ""       : "none";
  }
</script>

{% if demo %}
<script>
  // Rellenar campos automáticamente si viene del QR
  window.addEventListener('DOMContentLoaded', () => {
    const correoInput = document.getElementById('correo');
    const passInput   = document.getElementById('password');
    if (correoInput) correoInput.value = 'juan@gmail.com';
    if (passInput)   passInput.value   = 'juan123';
  });
</script>
{% endif %}

</body>
</html>
