<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - TrackSecurity{% endblock %}</title>

    <script>
        (function () {
            if (localStorage.getItem('ts_admin_sidebar_collapsed') === '1') {
                document.documentElement.classList.add('sidebar-pre-collapsed');
            }
        })();
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/base_admin.css') }}">

    {% block extra_css %}{% endblock %}
</head>

<body class="app-body">
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="app-layout" id="appLayout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">TS</div>

                <div class="brand-text">
                    <h2>TRACKSECURITY</h2>
                    <span>Panel administrador</span>
                </div>
            </div>

            <button type="button" class="sidebar-collapse-btn" id="btnCollapseSidebar" title="Contraer menú">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 6h16"></path>
                    <path d="M4 12h16"></path>
                    <path d="M4 18h16"></path>
                </svg>
            </button>

            <nav class="sidebar-nav">
                <a href="/admin/dashboard" class="nav-link {% if request.path.startswith('/admin/dashboard') %}active{% endif %}" title="Dashboard">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 9.5V20h14V9.5"></path><path d="M9 20v-6h6v6"></path></svg></span>
                    <span class="nav-text">Dashboard</span>
                </a>

                <a href="/admin/empresas" class="nav-link {% if request.path.startswith('/admin/empresas') %}active{% endif %}" title="Empresas">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"></path><path d="M5 21V7l8-4v18"></path><path d="M19 21V11l-6-4"></path><path d="M9 9h.01"></path><path d="M9 13h.01"></path><path d="M9 17h.01"></path></svg></span>
                    <span class="nav-text">Empresas</span>
                </a>

                <a href="/admin/suscripciones" class="nav-link {% if request.path.startswith('/admin/suscripciones') %}active{% endif %}" title="Suscripciones">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="M3 10h18"></path><path d="M7 15h2"></path><path d="M13 15h4"></path></svg></span>
                    <span class="nav-text">Suscripciones</span>
                </a>

                <a href="/admin/planes" class="nav-link {% if request.path.startswith('/admin/planes') %}active{% endif %}" title="Planes y tarifas">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H4v4"></path><path d="M4 16h16"></path><path d="M6 8V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"></path><path d="M6 12v8"></path><path d="M18 12v8"></path></svg></span>
                    <span class="nav-text">Planes y tarifas</span>
                </a>

                <a href="/admin/usuarios" class="nav-link {% if request.path.startswith('/admin/usuarios') %}active{% endif %}" title="Usuarios">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span>
                    <span class="nav-text">Usuarios</span>
                </a>

                <a href="/admin/vehiculos"
                    class="nav-link {% if request.path.startswith('/admin/vehiculos') %}active{% endif %}"
                    title="Vehículos">

                        <span class="nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round">

                                <path d="M3 16V9a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v7"></path>
                                <path d="M2 16h20"></path>
                                <path d="M6 16v3"></path>
                                <path d="M18 16v3"></path>
                                <circle cx="7.5" cy="16.5" r="1.5"></circle>
                                <circle cx="16.5" cy="16.5" r="1.5"></circle>
                                <path d="M17 11h3l2 3v2"></path>

                            </svg>
                        </span>

                        <span class="nav-text">
                            Vehículos
                        </span>

                    </a>

                <a href="/admin/dispositivos" class="nav-link {% if request.path.startswith('/admin/dispositivos') %}active{% endif %}" title="Dispositivos">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"></rect><path d="M12 18h.01"></path><path d="M9 6h6"></path></svg></span>
                    <span class="nav-text">Dispositivos</span>
                </a>

                <a href="/admin/servicios" class="nav-link {% if request.path.startswith('/admin/servicios') %}active{% endif %}" title="Servicios técnicos">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.1-3.1a6 6 0 0 1-7.9 7.9l-6 6a2 2 0 0 1-2.8-2.8l6-6a6 6 0 0 1 7.9-7.9l-3.3 3z"></path></svg></span>
                    <span class="nav-text">Servicios</span>
                </a>

                <a href="/admin/alertas" class="nav-link {% if request.path.startswith('/admin/alertas') %}active{% endif %}" title="Alertas">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3l-8.47-14.14a2 2 0 0 0-3.42 0Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg></span>
                    <span class="nav-text">Alertas</span>
                </a>

                <a href="/admin/configuracion" class="nav-link {% if request.path.startswith('/admin/configuracion') %}active{% endif %}" title="Configuración">
                    <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg></span>
                    <span class="nav-text">Configuración</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-session">
                    <p>Sesión activa</p>
                    <strong id="sidebarUserName">Admin</strong>
                </div>

                <button class="sidebar-logout-btn" type="button" id="btnSidebarLogout" title="Cerrar sesión">
                    <svg viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <path d="M16 17l5-5-5-5"></path>
                        <path d="M21 12H9"></path>
                    </svg>

                    <span class="logout-text">Cerrar sesión</span>
                </button>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="mobile-topbar">
                <button type="button" class="mobile-menu-btn" id="btnMobileMenu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6h16"></path>
                        <path d="M4 12h16"></path>
                        <path d="M4 18h16"></path>
                    </svg>
                </button>

                <strong class="mobile-topbar-brand">TRACKSECURITY ADMIN</strong>
            </header>

            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/configuracion_sistema.js') }}"></script>
    <script src="{{ url_for('static', filename='js/guards.js') }}"></script>
    

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const layout = document.getElementById('appLayout');
            const overlay = document.getElementById('sidebarOverlay');
            const btnCollapse = document.getElementById('btnCollapseSidebar');
            const btnMobile = document.getElementById('btnMobileMenu');
            const btnSidebarLogout = document.getElementById('btnSidebarLogout');

            const user = window.TrackAuth ? TrackAuth.getUser() : null;
            const name = user?.nombre || 'Admin';

            const sidebarName = document.getElementById('sidebarUserName');
            if (sidebarName) sidebarName.textContent = name;

            if (localStorage.getItem('ts_admin_sidebar_collapsed') === '1') {
                layout.classList.add('sidebar-collapsed');
            }

            document.documentElement.classList.remove('sidebar-pre-collapsed');

            btnCollapse?.addEventListener('click', function () {
                layout.classList.toggle('sidebar-collapsed');

                localStorage.setItem(
                    'ts_admin_sidebar_collapsed',
                    layout.classList.contains('sidebar-collapsed') ? '1' : '0'
                );
            });

            function abrirMenuMovil() {
                // En móvil el menú siempre debe abrirse completo.
                // No debe respetar el modo colapsado del escritorio.
                layout.classList.remove('sidebar-collapsed');
                layout.classList.add('sidebar-mobile-open');
                document.body.classList.add('sidebar-open-body');
            }

            function cerrarMenuMovil() {
                layout.classList.remove('sidebar-mobile-open');
                document.body.classList.remove('sidebar-open-body');

                // Al cerrar el menú móvil, restauramos el estado colapsado
                // solo si el usuario lo tenía activado para escritorio.
                if (localStorage.getItem('ts_admin_sidebar_collapsed') === '1') {
                    layout.classList.add('sidebar-collapsed');
                }
            }

            btnMobile?.addEventListener('click', function (event) {
                event.stopPropagation();
                abrirMenuMovil();
            });

            overlay?.addEventListener('click', cerrarMenuMovil);

            document.addEventListener('click', function (event) {
                const menuAbierto = layout.classList.contains('sidebar-mobile-open');

                if (!menuAbierto) return;

                const sidebar = document.getElementById('sidebar');
                const clickDentroSidebar = sidebar?.contains(event.target);
                const clickBotonMovil = btnMobile?.contains(event.target);

                if (!clickDentroSidebar && !clickBotonMovil) {
                    cerrarMenuMovil();
                }
            });

            btnSidebarLogout?.addEventListener('click', function () {
                TrackAuth.logout();
            });
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
